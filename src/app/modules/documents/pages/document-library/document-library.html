<div class="row row-sm">
  <div class="col-xl-12">
    <div class="card custom-card">
      <div class="card-header justify-content-between">
        <div class="card-title">Bibliothèque documentaire RH</div>
        <div class="btn-list">
          <button type="button" class="btn btn-primary" (click)="toggleCreateForm()">
            {{ showCreateForm ? 'Fermer le formulaire' : 'Deposer' }}
          </button>
          <button type="button" class="btn btn-outline-primary">Exporter</button>
        </div>
      </div>
      <div class="card-body">
        <div class="card border shadow-none mb-4" *ngIf="showCreateForm">
          <div class="card-body">
            <form [formGroup]="form" (ngSubmit)="saveDocument()" class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Reference (optionnel)</label>
                <input type="text" class="form-control" formControlName="reference" />
                <div class="text-danger fs-11 mt-1" *ngIf="fieldError('reference') as error">{{ error }}</div>
              </div>
              <div class="col-md-4">
                <label class="form-label">Titre</label>
                <input type="text" class="form-control" formControlName="title" />
                <div class="text-danger fs-11 mt-1" *ngIf="fieldError('title') as error">{{ error }}</div>
              </div>
              <div class="col-md-4">
                <label class="form-label">Type</label>
                <input type="text" class="form-control" formControlName="type" />
                <div class="text-danger fs-11 mt-1" *ngIf="fieldError('type') as error">{{ error }}</div>
              </div>
              <div class="col-md-4">
                <label class="form-label">Proprietaire</label>
                <input type="text" class="form-control" formControlName="owner" />
                <div class="text-danger fs-11 mt-1" *ngIf="fieldError('owner') as error">{{ error }}</div>
              </div>
              <div class="col-md-4">
                <label class="form-label">Mise a jour</label>
                <input type="date" class="form-control" formControlName="updatedAt" />
                <div class="text-danger fs-11 mt-1" *ngIf="fieldError('updatedAt') as error">{{ error }}</div>
              </div>
              <div class="col-md-4">
                <label class="form-label">Statut</label>
                <select class="form-select" formControlName="status">
                  <option value="Brouillon">Brouillon</option>
                  <option value="Publie">Publie</option>
                  <option value="Archive">Archive</option>
                </select>
              </div>
              <div class="col-12 d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-light" (click)="cancelCreate()" [disabled]="submitting">
                  Annuler
                </button>
                <button type="submit" class="btn btn-primary" [disabled]="submitting">
                  {{ submitting ? 'Enregistrement...' : 'Enregistrer le document' }}
                </button>
              </div>
            </form>
          </div>
        </div>

        <gridjs-angular [config]="gridConfig"></gridjs-angular>
      </div>
    </div>
  </div>
</div>
