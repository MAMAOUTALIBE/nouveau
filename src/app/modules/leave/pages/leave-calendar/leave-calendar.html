<div class="row row-sm">
  <div class="col-xl-3 col-lg-4">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Filtres rapides</div>
      </div>
      <div class="card-body d-grid gap-2">
        <button type="button" class="btn btn-primary" (click)="toggleCreateForm()">
          {{ showCreateForm ? 'Fermer le formulaire' : 'Planifier une absence' }}
        </button>
        <button type="button" class="btn btn-outline-primary">Exporter</button>

        <div class="card border shadow-none mt-2 mb-0" *ngIf="showCreateForm">
          <div class="card-body">
            <form [formGroup]="form" (ngSubmit)="saveEvent()" class="row g-3">
              <div class="col-12">
                <label class="form-label">Titre</label>
                <input type="text" class="form-control" formControlName="title" />
                <div class="text-danger fs-11 mt-1" *ngIf="fieldError('title') as error">{{ error }}</div>
              </div>
              <div class="col-12">
                <label class="form-label">Date debut</label>
                <input type="date" class="form-control" formControlName="start" />
                <div class="text-danger fs-11 mt-1" *ngIf="fieldError('start') as error">{{ error }}</div>
              </div>
              <div class="col-12">
                <label class="form-label">Date fin (optionnel)</label>
                <input type="date" class="form-control" formControlName="end" />
              </div>
              <div class="col-12">
                <label class="form-label">Couleur</label>
                <select class="form-select" formControlName="className">
                  <option value="bg-primary-transparent">Primaire</option>
                  <option value="bg-warning-transparent">Alerte</option>
                  <option value="bg-success-transparent">Succes</option>
                  <option value="bg-info-transparent">Info</option>
                  <option value="bg-danger-transparent">Danger</option>
                </select>
              </div>
              <div class="col-12 d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-light btn-sm" (click)="cancelCreate()" [disabled]="submitting">
                  Annuler
                </button>
                <button type="submit" class="btn btn-primary btn-sm" [disabled]="submitting">
                  {{ submitting ? 'Enregistrement...' : 'Enregistrer' }}
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Légende</div>
      </div>
      <div class="card-body">
        <ul class="list-unstyled mb-0">
          <li class="d-flex align-items-center mb-2"><span class="badge bg-primary me-2">&nbsp;</span> Congés annuels</li>
          <li class="d-flex align-items-center mb-2"><span class="badge bg-warning me-2">&nbsp;</span> Maladie / exceptionnels</li>
          <li class="d-flex align-items-center mb-2"><span class="badge bg-success me-2">&nbsp;</span> Maternité / paternité</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="col-xl-9 col-lg-8">
    <div class="card custom-card">
      <div class="card-header">
        <div class="card-title">Calendrier des absences</div>
      </div>
      <div class="card-body">
        <full-calendar [options]="calendarOptions"></full-calendar>
      </div>
    </div>
  </div>
</div>
