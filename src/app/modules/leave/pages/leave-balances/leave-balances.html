<div class="row row-sm">
  <div class="col-xl-12">
    <div class="card custom-card">
      <div class="card-header justify-content-between">
        <div class="card-title">Soldes de congés</div>
        <div class="btn-list">
          <button type="button" class="btn btn-primary" (click)="toggleCreateForm()">
            {{ showCreateForm ? 'Fermer le formulaire' : 'Mettre a jour les droits' }}
          </button>
          <button type="button" class="btn btn-outline-primary">Exporter</button>
        </div>
      </div>
      <div class="card-body">
        <div class="card border shadow-none mb-4" *ngIf="showCreateForm">
          <div class="card-body">
            <form [formGroup]="form" (ngSubmit)="saveBalance()" class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Type de conge</label>
                <input type="text" class="form-control" formControlName="type" />
                <div class="text-danger fs-11 mt-1" *ngIf="fieldError('type') as error">{{ error }}</div>
              </div>
              <div class="col-md-4">
                <label class="form-label">Jours alloues</label>
                <input type="number" class="form-control" formControlName="allocated" min="0" />
                <div class="text-danger fs-11 mt-1" *ngIf="fieldError('allocated') as error">{{ error }}</div>
              </div>
              <div class="col-md-4">
                <label class="form-label">Jours consommes</label>
                <input type="number" class="form-control" formControlName="consumed" min="0" />
                <div class="text-danger fs-11 mt-1" *ngIf="fieldError('consumed') as error">{{ error }}</div>
              </div>
              <div class="col-12 d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-light" (click)="cancelCreate()" [disabled]="submitting">
                  Annuler
                </button>
                <button type="submit" class="btn btn-primary" [disabled]="submitting">
                  {{ submitting ? 'Enregistrement...' : 'Enregistrer les droits' }}
                </button>
              </div>
            </form>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table text-nowrap">
            <thead>
              <tr>
                <th>Type</th>
                <th>Alloué</th>
                <th>Consommé</th>
                <th>Restant</th>
                <th>Progression</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let balance of balances">
                <td class="fw-semibold">{{ balance.type }}</td>
                <td>{{ balance.allocated }} j</td>
                <td>{{ balance.consumed }} j</td>
                <td>
                  <span class="badge bg-light text-default">{{ balance.remaining }} j</span>
                </td>
                <td class="w-25">
                  <div class="progress progress-sm">
                    <div class="progress-bar" role="progressbar" [style.width.%]="percent(balance.allocated, balance.consumed)"></div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
